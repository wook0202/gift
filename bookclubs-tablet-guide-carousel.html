<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>참빛북클럽 태블릿 사용 가이드</title>
  <style>
    :root{--ink:#17213b;--muted:#6f7b94;--blue:#5f87f7;--blue-dark:#315fd5;--sky:#eaf6ff;--red:#d92c4b;--shadow:0 26px 70px rgba(56,87,145,.16);--slide:min(760px,calc(100vw - 470px))}
    *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;color:var(--ink);background:#fff;font-family:Pretendard,"Noto Sans KR","Malgun Gothic",sans-serif;overflow-x:hidden}button{font:inherit}
    .page-header{height:72px;display:flex;align-items:center;justify-content:space-between;padding:0 clamp(24px,6vw,96px);border-bottom:1px solid #edf2f7;background:rgba(255,255,255,.96);position:sticky;top:0;z-index:20}
    .brand{font-weight:900;letter-spacing:-.7px;font-size:19px}.brand b{color:var(--red)}.header-count{font-size:13px;color:var(--muted);font-weight:700}
    .intro{text-align:center;padding:58px 24px 52px}.intro h1{margin:0;font-size:clamp(32px,4vw,54px);letter-spacing:-2.2px;line-height:1.12}.intro p{max-width:660px;margin:20px auto 0;color:var(--muted);font-size:16px;line-height:1.8;word-break:keep-all}
    .guide-section{background:var(--sky);padding:56px 0 72px;min-height:720px}
    .active-copy{text-align:center;padding:0 24px 30px;min-height:112px}.active-copy .number{font-size:12px;font-weight:900;color:var(--blue-dark);letter-spacing:.12em}.active-copy h2{margin:8px 0 7px;font-size:clamp(25px,3vw,38px);letter-spacing:-1.5px}.active-copy p{margin:0;color:var(--muted);font-size:14px}
    .guide-layout{display:grid;grid-template-columns:280px minmax(0,1fr);gap:28px;max-width:1440px;margin:0 auto;padding:0 32px}
    .step-nav{align-self:center;max-height:620px;overflow-y:auto;background:rgba(255,255,255,.72);border:1px solid rgba(255,255,255,.9);border-radius:24px;padding:12px;box-shadow:0 18px 45px rgba(61,102,164,.09);scrollbar-width:thin}
    .step-button{width:100%;border:0;background:transparent;border-radius:16px;padding:14px 15px;display:grid;grid-template-columns:34px 1fr;gap:11px;text-align:left;cursor:pointer;color:#75829b;transition:.22s}.step-button+.step-button{margin-top:3px}.step-button:hover{background:rgba(255,255,255,.8);color:var(--ink)}.step-button[aria-selected="true"]{background:#fff;color:var(--ink);box-shadow:0 10px 28px rgba(65,99,154,.12)}
    .step-num{width:32px;height:32px;border-radius:10px;background:#dceaff;display:grid;place-items:center;font-weight:900;color:#5674c9;font-size:13px;transition:.22s}.step-button[aria-selected="true"] .step-num{background:var(--blue);color:#fff}
    .step-label strong{display:block;font-size:14px;letter-spacing:-.35px;line-height:1.25}.step-label span{display:block;font-size:11px;margin-top:4px;color:#98a4b8}
    .carousel-shell{min-width:0}
    .carousel{display:flex;gap:28px;overflow-x:auto;scroll-snap-type:x mandatory;scroll-behavior:smooth;padding:28px calc((100% - var(--slide))/2) 42px;scrollbar-width:none;cursor:grab;user-select:none;overscroll-behavior-x:contain}.carousel::-webkit-scrollbar{display:none}.carousel.dragging{cursor:grabbing;scroll-behavior:auto;scroll-snap-type:none}
    .slide{flex:0 0 var(--slide);width:var(--slide);scroll-snap-align:center;transform:scale(.86);opacity:.46;filter:saturate(.7);transition:transform .34s,opacity .34s,filter .34s;cursor:pointer}.slide.active{transform:scale(1);opacity:1;filter:none;cursor:default}
    .tablet{aspect-ratio:16/10;background:#1c2231;border:2px solid #3b4254;border-radius:34px;padding:16px;box-shadow:var(--shadow);position:relative}.tablet:before{content:"";position:absolute;width:7px;height:7px;border-radius:50%;background:#596277;left:50%;top:5px;transform:translateX(-50%)}
    .screen{height:100%;border-radius:21px;background:#101521;overflow:hidden;border:1px solid #cbd3df;position:relative}
    .service-image{display:block;width:100%;height:100%;object-fit:fill;pointer-events:none}
    /* 플레이 오버레이 */
    .play-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,18,40,.42);border-radius:inherit;cursor:pointer;opacity:0;transition:opacity .25s;z-index:10}
    .slide.active .play-overlay{opacity:1}
    .slide.active .play-overlay:hover{background:rgba(10,18,40,.6)}
    .play-icon{width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,.18);border:2.5px solid rgba(255,255,255,.7);display:grid;place-items:center}
    .play-icon svg{width:26px;height:26px;margin-left:3px}
    .play-label{margin-top:12px;color:#fff;font-size:13px;font-weight:700}
    /* 컨트롤 */
    .controls{display:flex;justify-content:center;align-items:center;gap:14px;margin-top:2px}.arrow{width:46px;height:46px;border-radius:50%;border:1px solid #d3e1ee;background:#fff;color:#486bd1;display:grid;place-items:center;cursor:pointer;box-shadow:0 8px 22px rgba(55,87,135,.1);transition:.2s}.arrow:hover{transform:translateY(-2px)}.arrow:disabled{opacity:.3;cursor:not-allowed}.arrow svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
    .dots{display:flex;gap:8px}.dot{width:8px;height:8px;border-radius:8px;border:0;padding:0;background:#b9cce2;cursor:pointer;transition:.2s}.dot.active{width:28px;background:#5f87f7}
    .gesture{text-align:center;margin-top:13px;color:#7d8ca3;font-size:11px}
    .source-notes{max-width:760px;margin:20px auto 0;display:grid;grid-template-columns:1fr 1fr;gap:12px}.note{background:rgba(255,255,255,.78);border:1px solid #dbe7f3;border-radius:14px;padding:14px 16px}.note strong{display:block;color:#4772d7;font-size:11px;margin-bottom:6px}.note p{margin:0;color:#5d6a81;font-size:12px;line-height:1.65;word-break:keep-all}
    /* ===== 팝업 모달 (단순하게) ===== */
    #videoModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:9999;align-items:center;justify-content:center}
    #videoModal.on{display:flex}
    .modal-box{background:#0d1526;border-radius:16px;overflow:hidden;width:min(860px,92vw);box-shadow:0 40px 100px rgba(0,0,0,.7)}
    .modal-top{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:#111c30}
    .modal-top span{color:#fff;font-size:14px;font-weight:800}.modal-top span em{color:#7fa6ff;font-style:normal;margin-right:8px;font-size:12px}
    .modal-top button{width:32px;height:32px;border-radius:50%;border:0;background:rgba(255,255,255,.15);color:#fff;cursor:pointer;font-size:18px;line-height:1}
    .modal-box video{display:block;width:100%;background:#000}
    @media(max-width:980px){:root{--slide:min(700px,calc(100vw - 70px))}.guide-layout{display:block;padding:0}.step-nav{display:flex;max-height:none;overflow-x:auto;overflow-y:hidden;margin:0 20px 14px;padding:8px;border-radius:18px;scrollbar-width:none}.step-nav::-webkit-scrollbar{display:none}.step-button{min-width:180px}.step-button+.step-button{margin:0 0 0 4px}}
    /* ===== 학생용 모드 컬러 (green) ===== */
    body.student-mode{--blue:#10b981;--blue-dark:#047857;--sky:#ecfdf5;--red:#059669}
    body.student-mode .step-button[aria-selected="true"] .step-num{background:#10b981}
    body.student-mode .dot.active{background:#10b981;width:28px}
    body.student-mode .arrow{color:#059669}
    body.student-mode .note strong{color:#047857}
    body.student-mode .active-copy .number{color:#047857}
    body.student-mode .brand b{color:#10b981}
    /* ===== 모드 전환 토글 ===== */
    .mode-toggle{display:inline-flex;background:#e8edf5;border-radius:40px;padding:4px;gap:4px;margin:0 auto 32px;border:1px solid #d4dde8}
    body.student-mode .mode-toggle{background:#d1fae5;border-color:#a7f3d0}
    .mode-btn{border:0;background:transparent;border-radius:32px;padding:9px 26px;font-size:14px;font-weight:700;color:#8794a8;cursor:pointer;transition:.2s;letter-spacing:-.3px}
    .mode-btn.active{background:#fff;color:var(--ink);box-shadow:0 2px 10px rgba(0,0,0,.1)}
    body.student-mode .mode-btn.active{background:#fff;color:#047857}
    @media(max-width:620px){.page-header{height:60px;padding:0 18px}.guide-section{padding-top:38px}.step-nav{margin-inline:12px}}
  </style>
</head>

<script src="chambit-tutorial-slides-data.js"></script>
<script>
  var data=window.CHAMBIT_TUTORIAL_DATA||{slides:[],audience:{student:{actions:[],tips:[]}}};
  var src=data.slides;
  var aud=(data.audience&&data.audience.student)||{actions:[],tips:[]};

  function strip(v){var d=document.createElement('div');d.innerHTML=v||'';return d.textContent.trim()}
  function clean(v){return(v||'').replace(/^\d+\.\s*/,'')}

  var guides=src.map(function(s,i){return{
    title:clean(s.title), desc:strip(s.description||s.subtitle),
    short:s.subtitle||'',
    action:aud.actions[i]||(s.hotspot&&s.hotspot.label)||'',
    tip:aud.tips[i]||''
  }});

  // 슬라이드 생성 — 첫 번째만 onclick="openModal()" 오버레이 포함
  var carousel=document.getElementById('carousel');
  carousel.innerHTML=src.map(function(s,i){
    var overlay=i===0
      ? '<div class="play-overlay" onpointerdown="event.stopPropagation()" onclick="openModal()"><div class="play-icon"><svg viewBox="0 0 24 24" fill="white"><polygon points="6,3 20,12 6,21"/></svg></div><span class="play-label">▶ 가이드 영상 보기</span></div>'
      : '';
    return '<article class="slide'+(i===0?' active':'')+'" data-index="'+i+'"><div class="tablet"><div class="screen">'+overlay+'<img class="service-image" src="data:image/jpeg;base64,'+s.image+'" draggable="false"></div></div></article>';
  }).join('');

  var slides=Array.from(carousel.querySelectorAll('.slide'));
  var stepNav=document.getElementById('stepNav');
  var dots=document.getElementById('dots');
  var prevBtn=document.getElementById('prevBtn');
  var nextBtn=document.getElementById('nextBtn');
  var active=0,scrollTimer,dragStart,scrollStart,dragged=false;

  guides.forEach(function(g,i){
    var b=document.createElement('button');
    b.className='step-button';b.type='button';b.setAttribute('aria-selected',i===0?'true':'false');
    b.innerHTML='<span class="step-num">'+String(i+1).padStart(2,'0')+'</span><span class="step-label"><strong>'+g.title+'</strong><span>'+g.short+'</span></span>';
    b.onclick=function(){focusGuide(i)};
    stepNav.appendChild(b);
    var d=document.createElement('button');
    d.className='dot'+(i===0?' active':'');d.type='button';
    d.onclick=function(){focusGuide(i)};
    dots.appendChild(d);
  });

  function updateUI(i){
    active=Math.max(0,Math.min(guides.length-1,i));
    slides.forEach(function(s,j){s.classList.toggle('active',j===active)});
    Array.from(stepNav.children).forEach(function(b,j){b.setAttribute('aria-selected',j===active?'true':'false')});
    Array.from(dots.children).forEach(function(d,j){d.classList.toggle('active',j===active)});
    document.getElementById('activeNumber').textContent='STEP '+String(active+1).padStart(2,'0');
    document.getElementById('currentHeader').textContent=String(active+1).padStart(2,'0');
    document.getElementById('totalHeader').textContent=String(guides.length).padStart(2,'0');
    var g=guides[active];
    if(g){document.getElementById('activeTitle').textContent=g.title;document.getElementById('activeDesc').textContent=g.desc;document.getElementById('actionText').textContent=g.action;document.getElementById('tipText').textContent=g.tip;}
    prevBtn.disabled=active===0;nextBtn.disabled=active===guides.length-1;
    var sel=stepNav.children[active];if(sel)sel.scrollIntoView({behavior:'smooth',block:'nearest',inline:'nearest'});
  }
  function focusGuide(i,beh){
    updateUI(i);
    var s=slides[active];if(!s)return;
    // getBoundingClientRect 기준으로 계산 (offsetParent 불일치 문제 해결)
    var cr=carousel.getBoundingClientRect();
    var sr=s.getBoundingClientRect();
    var slideAbsLeft=sr.left-cr.left+carousel.scrollLeft;
    var target=slideAbsLeft-(carousel.clientWidth-s.offsetWidth)/2;
    carousel.style.scrollSnapType='none';
    carousel.scrollLeft=target;
    requestAnimationFrame(function(){carousel.style.scrollSnapType='';});
  }
  function nearest(){
    var cx=carousel.clientWidth/2,best=0,dist=Infinity;
    var cr=carousel.getBoundingClientRect();
    slides.forEach(function(s,i){
      var sr=s.getBoundingClientRect();
      var slideCenter=sr.left-cr.left+s.offsetWidth/2;
      var d=Math.abs(slideCenter-cx);
      if(d<dist){dist=d;best=i}
    });
    return best;
  }
  slides.forEach(function(s,i){s.addEventListener('click',function(){if(!dragged&&i!==active)focusGuide(i)})});
  prevBtn.onclick=function(){focusGuide(active-1)};
  nextBtn.onclick=function(){focusGuide(active+1)};
  carousel.addEventListener('scroll',function(){clearTimeout(scrollTimer);scrollTimer=setTimeout(function(){updateUI(nearest())},90)},{passive:true});
  carousel.addEventListener('pointerdown',function(e){
    if(e.pointerType==='mouse'&&e.button!==0)return;
    dragStart=e.clientX;scrollStart=carousel.scrollLeft;dragged=false;
    carousel.classList.add('dragging');carousel.setPointerCapture(e.pointerId);
  });
  carousel.addEventListener('pointermove',function(e){
    if(!carousel.hasPointerCapture(e.pointerId))return;
    var d=e.clientX-dragStart;if(Math.abs(d)>5)dragged=true;carousel.scrollLeft=scrollStart-d;
  });
  function endDrag(e){
    if(!carousel.hasPointerCapture(e.pointerId))return;
    carousel.releasePointerCapture(e.pointerId);carousel.classList.remove('dragging');
    focusGuide(nearest());setTimeout(function(){dragged=false},80);
  }
  carousel.addEventListener('pointerup',endDrag);carousel.addEventListener('pointercancel',endDrag);
  carousel.addEventListener('keydown',function(e){
    if(e.key==='ArrowLeft'){e.preventDefault();focusGuide(active-1)}
    if(e.key==='ArrowRight'){e.preventDefault();focusGuide(active+1)}
  });
  window.addEventListener('resize',function(){focusGuide(active,'auto')});
  // 초기 스크롤: 레이아웃이 완전히 완료된 후 실행
  function initCarousel(){
    carousel.scrollLeft=0;
    updateUI(0);
  }
  if(document.readyState==='complete'){setTimeout(initCarousel,50);}
  else{window.addEventListener('load',function(){setTimeout(initCarousel,50)});}
</script>
</body>
</html>
